# ═══════════════════════════════════════════════════════════════
#  LabOS · starship.toml — prompt (paleta Catppuccin Mocha)
# ═══════════════════════════════════════════════════════════════

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](surface0)\
$os\
$directory\
[](fg:surface0 bg:surface1)\
$git_branch\
$git_status\
[](fg:surface1 bg:surface2)\
$flutter\
$nodejs\
$python\
[](fg:surface2 bg:none)\
$fill\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = "catppuccin_mocha"

[fill]
symbol = " "

[os]
disabled = false
style = "bg:surface0 fg:text"
[os.symbols]
Macos = "󰀵 "

[directory]
style = "bg:surface0 fg:text"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Github" = " "
"LabOS" = "🔬 "

[git_branch]
symbol = ""
style = "bg:surface1 fg:mauve"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:surface1 fg:red"
format = '[$all_status$ahead_behind ]($style)'

[flutter]
symbol = ""
style = "bg:surface2 fg:blue"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:surface2 fg:green"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "bg:surface2 fg:yellow"
format = '[ $symbol ($version) ]($style)'

[cmd_duration]
min_time = 500
style = "fg:subtext0"
format = '[  $duration ]($style)'

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
